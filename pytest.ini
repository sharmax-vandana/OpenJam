[pytest]
# Pytest configuration for Open Jam

# Python path
pythonpath = .

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Coverage options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    async: Async tests
    auth: Authentication tests
    rooms: Room tests
    slow: Slow running tests
