version: '3.9'

services:
  openjam:
    build: .
    container_name: openjam-app
    ports:
      - "8000:8000"
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-prod}
      - DATABASE_URL=sqlite:///./openjam.db
      - ALLOWED_ORIGINS=http://localhost:8000,http://localhost:3000
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - openjam_logs:/app/logs
      - openjam_db:/app
    networks:
      - openjam-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  openjam_logs:
    driver: local
  openjam_db:
    driver: local

networks:
  openjam-network:
    driver: bridge
