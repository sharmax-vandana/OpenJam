services:
  openjam:
    build: .
    container_name: openjam-prod
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      - PORT=8000
    volumes:
      - openjam_logs:/app/logs
    networks:
      - openjam-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  openjam_logs:
    driver: local

networks:
  openjam-network:
    driver: bridge
